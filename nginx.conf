server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets
    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;

    # Hashed build assets (filenames change on every build) → cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA service worker & registration shim: these keep a STABLE filename, so
    # they must NOT be pinned by the browser/CDN — always revalidate, otherwise
    # a stale service worker would lock the app to an old precache and never
    # pick up new builds.
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
        expires off;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, must-revalidate";
        expires off;
    }

    # Web app manifest: stable filename, revalidate (cheap, rarely changes).
    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
        add_header Cache-Control "no-cache, must-revalidate";
        expires off;
    }

    # SPA: always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
